name: Python Hello World CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Hello World
      run: python main.py

    - name: Run tests
      run: |
        python -c "print('测试通过！')"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy summary
      run: |
        echo "🎉 部署成功！"
        echo "分支: ${{ github.ref }}"
        echo "提交: ${{ github.sha }}"
        echo "作者: ${{ github.actor }}"
