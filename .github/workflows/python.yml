name: Supabase + Claude Hello World CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run syntax check
      run: |
        python -m py_compile app.py
        python -m py_compile main.py

    - name: Verify imports
      run: |
        python -c "import fastapi; import supabase; import anthropic"
        echo "✓ 所有依赖导入成功"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy summary
      run: |
        echo "🎉 部署成功！"
        echo "项目: Supabase + Claude Hello World"
        echo "分支: ${{ github.ref }}"
        echo "提交: ${{ github.sha }}"
